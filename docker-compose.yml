# Define the services that Docker Compose should manage for this project.
services:
  # Run the FastAPI API Gateway service.
  api-gateway:
    # Build the Docker image from the api-gateway service folder.
    build:
      # Use apps/api-gateway as the Docker build context.
      context: ./apps/api-gateway
      # Use the Dockerfile inside apps/api-gateway.
      dockerfile: Dockerfile
    # Give the built image a clear local name.
    image: cosmosai-api-gateway:latest
    # Give the running container a predictable name.
    container_name: cosmosai-api-gateway
    # Map host port 8000 to container port 8000.
    ports:
      - "8000:8000"

  # Run the FastAPI Inference Router service.
  inference-router:
    # Build the Docker image from the inference-router service folder.
    build:
      # Use apps/inference-router as the Docker build context.
      context: ./apps/inference-router
      # Use the Dockerfile inside apps/inference-router.
      dockerfile: Dockerfile
    # Give the built image a clear local name.
    image: cosmosai-inference-router:latest
    # Give the running container a predictable name.
    container_name: cosmosai-inference-router
    # Map host port 8001 to container port 8000.
    ports:
      - "8001:8000"

  # Run the FastAPI Galaxy Classifier service.
  galaxy-classifier-service:
    # Build the Docker image from the galaxy-classifier-service folder.
    build:
      # Use apps/galaxy-classifier-service as the Docker build context.
      context: ./apps/galaxy-classifier-service
      # Use the Dockerfile inside apps/galaxy-classifier-service.
      dockerfile: Dockerfile
    # Give the built image a clear local name.
    image: cosmosai-galaxy-classifier-service:latest
    # Give the running container a predictable name.
    container_name: cosmosai-galaxy-classifier-service
    # Map host port 8002 to container port 8000.
    ports:
      - "8002:8000"

  # Run the FastAPI Stellar Classifier service.
  stellar-classifier-service:
    # Build the Docker image from the stellar-classifier-service folder.
    build:
      # Use apps/stellar-classifier-service as the Docker build context.
      context: ./apps/stellar-classifier-service
      # Use the Dockerfile inside apps/stellar-classifier-service.
      dockerfile: Dockerfile
    # Give the built image a clear local name.
    image: cosmosai-stellar-classifier-service:latest
    # Give the running container a predictable name.
    container_name: cosmosai-stellar-classifier-service
    # Map host port 8003 to container port 8000.
    ports:
      - "8003:8000"
